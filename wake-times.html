<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wake Times Ahh</title>
  <link rel="manifest" href="wake-manifest.json">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wake Times Ahh">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #1a1a1f;
      --surface2: #242430;
      --border: #2e2e3a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --danger: #f77c6a;
      --success: #6af7a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    #live-clock {
      font-size: 0.85rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Tab bar ── */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    nav button {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* ── Tonight view ── */
    #tonight-view {
      align-items: center;
      padding: 32px 20px 20px;
      gap: 0;
    }

    #night-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 32px;
    }

    #log-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--accent-glow);
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 0 40px var(--accent-glow);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #log-btn:active {
      transform: scale(0.94);
      background: rgba(124, 106, 247, 0.45);
    }

    #log-btn .icon { font-size: 2rem; line-height: 1; }

    #flash {
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--success);
      min-height: 1.2em;
      transition: opacity 0.4s;
    }

    #flash.hidden { opacity: 0; }

    /* Tonight's entries */
    #tonight-list-wrap {
      width: 100%;
      max-width: 400px;
      margin-top: 32px;
    }

    #tonight-count {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface);
      border-radius: 10px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }

    .entry-time {
      font-size: 1.25rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .entry-since {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .entry-meta {
      text-align: right;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
      margin-left: 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .delete-btn:hover { color: var(--danger); background: rgba(247, 124, 106, 0.1); }

    /* ── History view ── */
    #history-view {
      padding: 16px 20px;
      overflow-y: auto;
      gap: 16px;
    }

    #history-empty {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      margin-top: 40px;
    }

    .night-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .night-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .night-card-date {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .night-card-count {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .night-card-entries { padding: 8px 14px; }

    .history-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .history-entry:last-child { border-bottom: none; }

    .history-entry-time {
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .history-entry-gap {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex;
      gap: 8px;
      padding: 0 14px 10px;
    }

    .stat-chip {
      flex: 1;
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-chip .val {
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-chip .lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .clear-night-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s;
    }

    .clear-night-btn:hover { color: var(--danger); }
  </style>
</head>
<body>

<header>
  <h1>Wake Times Ahh</h1>
  <span id="live-clock"></span>
</header>

<nav>
  <button class="active" data-view="tonight-view">Tonight</button>
  <button data-view="history-view">History</button>
</nav>

<div id="tonight-view" class="view active">
  <span id="night-label"></span>
  <button id="log-btn" onclick="logWake()">
    <span class="icon">⏱</span>
    Log wake
  </button>
  <div id="flash" class="hidden"></div>
  <div id="tonight-list-wrap">
    <div id="tonight-count"></div>
    <div id="tonight-list"></div>
  </div>
</div>

<div id="history-view" class="view">
  <div id="history-empty" style="display:none">No history yet.</div>
  <div id="history-list"></div>
</div>

<script>
  // A "night" runs from 20:00 to 11:59 the next day.
  // We key nights by the date the night *started* (the evening date).
  function nightKey(ts) {
    const d = new Date(ts);
    const h = d.getHours();
    // Before noon → belongs to previous evening's night
    if (h < 12) {
      const prev = new Date(d);
      prev.setDate(prev.getDate() - 1);
      return prev.toISOString().slice(0, 10);
    }
    return d.toISOString().slice(0, 10);
  }

  function todayNightKey() { return nightKey(Date.now()); }

  function nightLabel(key) {
    const d = new Date(key + 'T20:00:00');
    const opts = { weekday: 'short', month: 'short', day: 'numeric' };
    const eve = d.toLocaleDateString(undefined, opts);
    const morn = new Date(d);
    morn.setDate(morn.getDate() + 1);
    const mornStr = morn.toLocaleDateString(undefined, opts);
    return `${eve} → ${mornStr}`;
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }

  function fmtGap(ms) {
    if (ms < 0) return '';
    const m = Math.round(ms / 60000);
    if (m < 60) return `+${m}m`;
    const h = Math.floor(m / 60), rem = m % 60;
    return `+${h}h ${rem}m`;
  }

  function getData() {
    try { return JSON.parse(localStorage.getItem('wake-times') || '{}'); } catch { return {}; }
  }

  function saveData(d) { localStorage.setItem('wake-times', JSON.stringify(d)); }

  function getTonightEntries() {
    const d = getData();
    return (d[todayNightKey()] || []).slice().sort((a, b) => a - b);
  }

  function logWake() {
    const ts = Date.now();
    const key = nightKey(ts);
    const d = getData();
    if (!d[key]) d[key] = [];
    d[key].push(ts);
    saveData(d);
    showFlash('Logged ' + fmtTime(ts));
    renderTonight();
  }

  function deleteEntry(key, ts) {
    const d = getData();
    if (!d[key]) return;
    d[key] = d[key].filter(t => t !== ts);
    if (d[key].length === 0) delete d[key];
    saveData(d);
    renderTonight();
    renderHistory();
  }

  let flashTimer;
  function showFlash(msg) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.classList.remove('hidden');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => el.classList.add('hidden'), 2000);
  }

  function renderTonight() {
    const key = todayNightKey();
    const entries = getTonightEntries();
    const countEl = document.getElementById('tonight-count');
    const listEl = document.getElementById('tonight-list');
    document.getElementById('night-label').textContent = nightLabel(key);

    if (entries.length === 0) {
      countEl.textContent = 'No wakes logged tonight';
      listEl.innerHTML = '';
      return;
    }

    countEl.textContent = entries.length === 1 ? '1 wake tonight' : `${entries.length} wakes tonight`;

    listEl.innerHTML = entries.map((ts, i) => {
      const gap = i > 0 ? fmtGap(ts - entries[i - 1]) : '';
      return `
        <div class="entry">
          <div>
            <div class="entry-time">${fmtTime(ts)}</div>
            ${gap ? `<div class="entry-since">${gap} since last</div>` : '<div class="entry-since">first wake</div>'}
          </div>
          <button class="delete-btn" onclick="deleteEntry('${key}', ${ts})" title="Delete">✕</button>
        </div>`;
    }).join('');
  }

  function renderHistory() {
    const d = getData();
    const keys = Object.keys(d).sort((a, b) => b.localeCompare(a));
    const listEl = document.getElementById('history-list');
    const emptyEl = document.getElementById('history-empty');

    if (keys.length === 0) {
      emptyEl.style.display = '';
      listEl.innerHTML = '';
      return;
    }

    emptyEl.style.display = 'none';

    listEl.innerHTML = keys.map(key => {
      const entries = d[key].slice().sort((a, b) => a - b);
      const count = entries.length;

      // Stats
      const gaps = entries.slice(1).map((t, i) => t - entries[i]);
      const avgGap = gaps.length ? Math.round(gaps.reduce((a, b) => a + b, 0) / gaps.length / 60000) : null;
      const first = entries[0], last = entries[entries.length - 1];

      const entriesHtml = entries.map((ts, i) => {
        const gap = i > 0 ? fmtGap(ts - entries[i - 1]) : '—';
        return `
          <div class="history-entry">
            <span class="history-entry-time">${fmtTime(ts)}</span>
            <span class="history-entry-gap">${gap}</span>
          </div>`;
      }).join('');

      const statsHtml = count > 1 ? `
        <div class="stats-strip">
          <div class="stat-chip">
            <div class="val">${fmtTime(first)}</div>
            <div class="lbl">First</div>
          </div>
          <div class="stat-chip">
            <div class="val">${fmtTime(last)}</div>
            <div class="lbl">Last</div>
          </div>
          ${avgGap !== null ? `<div class="stat-chip"><div class="val">${avgGap}m</div><div class="lbl">Avg gap</div></div>` : ''}
        </div>` : '';

      return `
        <div class="night-card">
          <div class="night-card-header">
            <span class="night-card-date">${nightLabel(key)}</span>
            <span style="display:flex;align-items:center;gap:8px">
              <span class="night-card-count">${count} wake${count !== 1 ? 's' : ''}</span>
              <button class="clear-night-btn" onclick="clearNight('${key}')" title="Delete night">✕</button>
            </span>
          </div>
          <div class="night-card-entries">${entriesHtml}</div>
          ${statsHtml}
        </div>`;
    }).join('');
  }

  function clearNight(key) {
    if (!confirm(`Delete all entries for ${nightLabel(key)}?`)) return;
    const d = getData();
    delete d[key];
    saveData(d);
    renderTonight();
    renderHistory();
  }

  // Tab switching
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.view).classList.add('active');
      if (btn.dataset.view === 'history-view') renderHistory();
    });
  });

  // Live clock
  function updateClock() {
    document.getElementById('live-clock').textContent = new Date().toLocaleTimeString(undefined, {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }

  updateClock();
  setInterval(updateClock, 1000);

  renderTonight();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/wake-sw.js').catch(() => {});
  }
</script>
</body>
</html>
