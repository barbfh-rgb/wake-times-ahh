<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wake Times Ahh</title>
  <link rel="manifest" href="wake-manifest.json">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wake Times Ahh">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #1a1a1f;
      --surface2: #242430;
      --border: #2e2e3a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --danger: #f77c6a;
      --success: #6af7a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    #live-clock {
      font-size: 0.85rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    nav button {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

    .view { display: none; flex-direction: column; flex: 1; overflow-y: auto; }
    .view.active { display: flex; }

    /* ── Tonight ── */
    #tonight-view {
      align-items: center;
      padding: 24px 20px 32px;
      gap: 16px;
    }

    #night-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .meta-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 400px;
    }

    .meta-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .meta-btn .meta-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
    .meta-btn .meta-label { font-size: 0.68rem; color: var(--muted); display: block; }
    .meta-btn .meta-time { font-size: 0.85rem; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; display: block; margin-top: 2px; }
    .meta-btn.set { border-color: var(--accent); background: var(--accent-glow); }
    .meta-btn:active { background: var(--surface2); }

    #log-btn {
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--accent-glow);
      color: var(--text);
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 0 40px var(--accent-glow);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #log-btn:active { transform: scale(0.94); background: rgba(124, 106, 247, 0.45); }
    #log-btn .icon { font-size: 2rem; line-height: 1; }

    #flash {
      font-size: 0.85rem;
      color: var(--success);
      min-height: 1.2em;
      transition: opacity 0.4s;
    }
    #flash.hidden { opacity: 0; }

    /* Quality */
    .quality-wrap {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .quality-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .quality-btns { display: flex; gap: 5px; }

    .quality-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 500;
      padding: 7px 2px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.4;
    }

    .quality-btn .q-num { font-size: 0.95rem; font-weight: 700; display: block; }
    .quality-btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--text); }

    /* Tonight list */
    #tonight-list-wrap { width: 100%; max-width: 400px; }

    #tonight-count {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .entry {
      background: var(--surface);
      border-radius: 10px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .entry-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
    }

    .entry-time { font-size: 1.2rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .entry-since { font-size: 0.72rem; color: var(--muted); }
    .entry-actions { display: flex; align-items: center; gap: 2px; }

    .note-btn, .delete-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.9rem; padding: 4px 6px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .note-btn:active { color: var(--accent); background: var(--accent-glow); }
    .delete-btn:active { color: var(--danger); background: rgba(247,124,106,0.1); }

    .entry-note { padding: 0 12px 8px; font-size: 0.76rem; color: var(--muted); font-style: italic; }

    .note-input-wrap { padding: 0 12px 10px; display: flex; gap: 6px; }

    .note-input {
      flex: 1;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.82rem;
      padding: 6px 10px; outline: none;
    }

    .note-input:focus { border-color: var(--accent); }

    .note-save-btn {
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 0.78rem; font-weight: 600;
      padding: 6px 10px; cursor: pointer;
    }

    /* ── History ── */
    #history-view { padding: 16px 20px; gap: 16px; }

    #history-empty { color: var(--muted); font-size: 0.9rem; text-align: center; margin-top: 40px; }

    .export-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted); font-size: 0.8rem;
      padding: 8px 14px; cursor: pointer; align-self: flex-start;
      transition: border-color 0.15s, color 0.15s;
    }
    .export-btn:active { border-color: var(--accent); color: var(--accent); }

    .night-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

    .night-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
    }

    .night-card-date { font-size: 0.85rem; font-weight: 600; }
    .night-card-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

    .night-card-count {
      font-size: 0.75rem; color: var(--muted);
      background: var(--surface2); padding: 2px 8px; border-radius: 99px;
    }

    .quality-pill {
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 7px; border-radius: 99px;
      background: var(--accent-glow); color: var(--accent);
    }

    .night-meta-row {
      display: flex; gap: 8px; padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }

    .night-meta-chip { flex: 1; background: var(--surface2); border-radius: 8px; padding: 6px 8px; text-align: center; }
    .night-meta-chip .val { font-size: 0.85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .night-meta-chip .lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; }

    .night-card-entries { padding: 8px 14px; }

    .history-entry {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .history-entry:last-child { border-bottom: none; }
    .history-entry-time { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .history-entry-note { font-size: 0.72rem; color: var(--muted); font-style: italic; margin-top: 2px; }
    .history-entry-gap { font-size: 0.75rem; color: var(--muted); padding-top: 2px; }

    .stats-strip { display: flex; gap: 8px; padding: 0 14px 10px; }
    .stat-chip { flex: 1; background: var(--surface2); border-radius: 8px; padding: 8px 10px; text-align: center; }
    .stat-chip .val { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-chip .lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    .clear-night-btn {
      background: none; border: none; color: var(--muted);
      font-size: 0.75rem; cursor: pointer; padding: 2px 6px;
      border-radius: 6px; transition: color 0.15s;
    }
    .clear-night-btn:active { color: var(--danger); }

    /* ── Week ── */
    #week-view { padding: 20px 16px; gap: 14px; }

    .week-section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .week-chart {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 12px 12px;
    }

    .week-bars {
      display: flex; align-items: flex-end; gap: 6px;
      height: 110px; margin-bottom: 8px;
    }

    .week-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
    .week-bar-count { font-size: 0.65rem; color: var(--muted); margin-bottom: 3px; font-variant-numeric: tabular-nums; min-height: 1em; }
    .week-bar { width: 100%; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s ease; }
    .week-bar.empty { background: var(--surface2); opacity: 0.4; }

    .week-labels { display: flex; gap: 6px; }
    .week-day-label { flex: 1; text-align: center; font-size: 0.65rem; color: var(--muted); }
    .week-day-label.today { color: var(--accent); font-weight: 700; }

    .week-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .week-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .week-stat .val { font-size: 1.4rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); }
    .week-stat .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .week-stat .sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  </style>
</head>

  // ── Data helpers ────────────────────────────────────────────────────────────
  function nightKey(ts) {
    const d = new Date(ts);
    if (d.getHours() < 12) {
      const prev = new Date(d);
      prev.setDate(prev.getDate() - 1);
      return prev.toISOString().slice(0, 10);
    }
    return d.toISOString().slice(0, 10);
  }

  function todayNightKey() { return nightKey(Date.now()); }

  function nightLabel(key) {
    const d = new Date(key + 'T20:00:00');
    const opts = { weekday: 'short', month: 'short', day: 'numeric' };
    const morn = new Date(d); morn.setDate(morn.getDate() + 1);
    return `${d.toLocaleDateString(undefined, opts)} → ${morn.toLocaleDateString(undefined, opts)}`;
  }

  function dayLabel(key) {
    return new Date(key + 'T12:00:00').toLocaleDateString(undefined, { weekday: 'short' });
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function fmtGap(ms) {
    if (ms < 0) return '';
    const m = Math.round(ms / 60000);
    if (m < 60) return `+${m}m`;
    return `+${Math.floor(m/60)}h ${m%60}m`;
  }

  function fmtDuration(ms) {
    if (!ms || ms < 0) return '—';
    const m = Math.round(ms / 60000);
    const h = Math.floor(m / 60);
    return h > 0 ? `${h}h ${m%60}m` : `${m}m`;
  }

  function getRawData() { try { return JSON.parse(localStorage.getItem('wake-times') || '{}'); } catch { return {}; } }
  function saveRawData(d) { localStorage.setItem('wake-times', JSON.stringify(d)); }

  // Supports both old (array) and new (object) formats
  function getNight(key) {
    const raw = getRawData()[key];
    if (!raw) return { wakes: [], bedtime: null, getup: null, quality: null };
    if (Array.isArray(raw)) return { wakes: raw.map(ts => ({ ts, note: '' })), bedtime: null, getup: null, quality: null };
    return raw;
  }

  function saveNight(key, night) {
    const d = getRawData();
    d[key] = night;
    saveRawData(d);
  }

  // ── Log actions ─────────────────────────────────────────────────────────────
  function logWake() {
    const ts = Date.now();
    const key = nightKey(ts);
    const night = getNight(key);
    night.wakes.push({ ts, note: '' });
    saveNight(key, night);
    showFlash('Logged ' + fmtTime(ts));
    renderTonight();
  }

  function logBedtime() {
    const key = todayNightKey();
    const night = getNight(key);
    night.bedtime = night.bedtime ? null : Date.now();
    saveNight(key, night);
    renderTonightMeta();
  }

  function logGetup() {
    const key = todayNightKey();
    const night = getNight(key);
    night.getup = night.getup ? null : Date.now();
    saveNight(key, night);
    renderTonightMeta();
  }

  function setQuality(q) {
    const key = todayNightKey();
    const night = getNight(key);
    night.quality = night.quality === q ? null : q;
    saveNight(key, night);
    renderQuality();
  }

  function deleteWake(key, ts) {
    const night = getNight(key);
    night.wakes = night.wakes.filter(w => w.ts !== ts);
    saveNight(key, night);
    renderTonight();
    if (document.getElementById('history-view').classList.contains('active')) renderHistory();
    if (document.getElementById('week-view').classList.contains('active')) renderWeek();
  }

  function saveNote(key, ts, note) {
    const night = getNight(key);
    const w = night.wakes.find(w => w.ts === ts);
    if (w) w.note = note;
    saveNight(key, night);
    renderTonight();
  }

  function toggleNoteInput(key, ts) {
    const wrap = document.getElementById('note-wrap-' + ts);
    if (!wrap) return;
    const showing = wrap.style.display !== 'none';
    wrap.style.display = showing ? 'none' : 'flex';
    if (!showing) document.getElementById('note-input-' + ts).focus();
  }

  function saveNoteFromInput(key, ts) {
    const val = document.getElementById('note-input-' + ts).value.trim();
    saveNote(key, ts, val);
  }

  // ── Render Tonight ──────────────────────────────────────────────────────────
  function renderTonightMeta() {
    const night = getNight(todayNightKey());
    document.getElementById('bedtime-display').textContent = night.bedtime ? fmtTime(night.bedtime) : 'Tap to log';
    document.getElementById('getup-display').textContent = night.getup ? fmtTime(night.getup) : 'Tap to log';
    document.getElementById('bedtime-btn').classList.toggle('set', !!night.bedtime);
    document.getElementById('getup-btn').classList.toggle('set', !!night.getup);
  }

  function renderQuality() {
    const night = getNight(todayNightKey());
    document.querySelectorAll('.quality-btn').forEach((btn, i) => {
      btn.classList.toggle('active', night.quality === i + 1);
    });
  }

  function renderTonight() {
    const key = todayNightKey();
    const night = getNight(key);
    const wakes = night.wakes.slice().sort((a, b) => a.ts - b.ts);

    document.getElementById('night-label').textContent = nightLabel(key);
    renderTonightMeta();
    renderQuality();

    const countEl = document.getElementById('tonight-count');
    const listEl = document.getElementById('tonight-list');

    if (!wakes.length) { countEl.textContent = 'No wakes logged yet'; listEl.innerHTML = ''; return; }

    countEl.textContent = wakes.length === 1 ? '1 wake tonight' : `${wakes.length} wakes tonight`;

    listEl.innerHTML = wakes.map((w, i) => {
      const gap = i > 0 ? fmtGap(w.ts - wakes[i-1].ts) : '';
      return `
        <div class="entry" id="entry-${w.ts}">
          <div class="entry-main">
            <div>
              <div class="entry-time">${fmtTime(w.ts)}</div>
              <div class="entry-since">${gap ? gap + ' since last' : 'first wake'}</div>
            </div>
            <div class="entry-actions">
              <button class="note-btn" onclick="toggleNoteInput('${key}',${w.ts})" title="Note">📝</button>
              <button class="delete-btn" onclick="deleteWake('${key}',${w.ts})" title="Delete">✕</button>
            </div>
          </div>
          ${w.note ? `<div class="entry-note">📝 ${w.note}</div>` : ''}
          <div class="note-input-wrap" id="note-wrap-${w.ts}" style="display:none">
            <input class="note-input" id="note-input-${w.ts}" type="text" placeholder="Add a note…" value="${w.note}" maxlength="100">
            <button class="note-save-btn" onclick="saveNoteFromInput('${key}',${w.ts})">Save</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Render History ──────────────────────────────────────────────────────────
  function renderHistory() {
    const raw = getRawData();
    const keys = Object.keys(raw).sort((a, b) => b.localeCompare(a));
    const listEl = document.getElementById('history-list');
    const emptyEl = document.getElementById('history-empty');

    if (!keys.length) { emptyEl.style.display = ''; listEl.innerHTML = ''; return; }
    emptyEl.style.display = 'none';

    const qLabels = ['', 'Very tired', 'Tired', 'OK', 'Rested', 'Great'];

    listEl.innerHTML = keys.map(key => {
      const night = getNight(key);
      const wakes = night.wakes.slice().sort((a, b) => a.ts - b.ts);
      const count = wakes.length;
      const gaps = wakes.slice(1).map((w, i) => w.ts - wakes[i].ts);
      const avgGap = gaps.length ? Math.round(gaps.reduce((a,b) => a+b, 0) / gaps.length / 60000) : null;

      const metaHtml = (night.bedtime || night.getup) ? `
        <div class="night-meta-row">
          <div class="night-meta-chip"><div class="val">${night.bedtime ? fmtTime(night.bedtime) : '—'}</div><div class="lbl">Bedtime</div></div>
          <div class="night-meta-chip"><div class="val">${night.getup ? fmtTime(night.getup) : '—'}</div><div class="lbl">Get up</div></div>
          ${night.bedtime && night.getup ? `<div class="night-meta-chip"><div class="val">${fmtDuration(night.getup - night.bedtime)}</div><div class="lbl">In bed</div></div>` : ''}
        </div>` : '';

      const entriesHtml = wakes.map((w, i) => {
        const gap = i > 0 ? fmtGap(w.ts - wakes[i-1].ts) : '—';
        return `
          <div class="history-entry">
            <div>
              <div class="history-entry-time">${fmtTime(w.ts)}</div>
              ${w.note ? `<div class="history-entry-note">📝 ${w.note}</div>` : ''}
            </div>
            <span class="history-entry-gap">${gap}</span>
          </div>`;
      }).join('');

      const statsHtml = count > 1 ? `
        <div class="stats-strip">
          <div class="stat-chip"><div class="val">${fmtTime(wakes[0].ts)}</div><div class="lbl">First</div></div>
          <div class="stat-chip"><div class="val">${fmtTime(wakes[count-1].ts)}</div><div class="lbl">Last</div></div>
          ${avgGap !== null ? `<div class="stat-chip"><div class="val">${avgGap}m</div><div class="lbl">Avg gap</div></div>` : ''}
        </div>` : '';

      return `
        <div class="night-card">
          <div class="night-card-header">
            <span class="night-card-date">${nightLabel(key)}</span>
            <span class="night-card-right">
              ${night.quality ? `<span class="quality-pill">${night.quality}/5 ${qLabels[night.quality]}</span>` : ''}
              <span class="night-card-count">${count} wake${count !== 1 ? 's' : ''}</span>
              <button class="clear-night-btn" onclick="clearNight('${key}')">✕</button>
            </span>
          </div>
          ${metaHtml}
          <div class="night-card-entries">${entriesHtml || '<div style="padding:8px 0;font-size:0.82rem;color:var(--muted)">No wakes logged</div>'}</div>
          ${statsHtml}
        </div>`;
    }).join('');
  }

  function clearNight(key) {
    if (!confirm(`Delete all entries for ${nightLabel(key)}?`)) return;
    const d = getRawData(); delete d[key]; saveRawData(d);
    renderTonight(); renderHistory();
    if (document.getElementById('week-view').classList.contains('active')) renderWeek();
  }

  // ── Render Week ─────────────────────────────────────────────────────────────
  function renderWeek() {
    const today = todayNightKey();
    const keys = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today + 'T12:00:00');
      d.setDate(d.getDate() - i);
      keys.push(d.toISOString().slice(0, 10));
    }

    const nights = keys.map(k => ({ key: k, night: getNight(k) }));
    const counts = nights.map(n => n.night.wakes.length);
    const maxCount = Math.max(...counts, 1);

    document.getElementById('week-bars').innerHTML = nights.map((n, i) => {
      const c = counts[i];
      const hasData = c > 0 || n.night.bedtime || n.night.getup;
      const h = hasData ? Math.max(8, Math.round((c / maxCount) * 100)) : 8;
      return `
        <div class="week-bar-wrap">
          <div class="week-bar-count">${hasData && c > 0 ? c : ''}</div>
          <div class="week-bar${!hasData ? ' empty' : ''}" style="height:${h}%"></div>
        </div>`;
    }).join('');

    document.getElementById('week-labels').innerHTML = nights.map((n, i) =>
      `<div class="week-day-label${n.key === today ? ' today' : ''}">${n.key === today ? 'Today' : dayLabel(n.key)}</div>`
    ).join('');

    const nightsWithData = nights.filter(n => n.night.wakes.length || n.night.bedtime || n.night.getup);
    const totalWakes = counts.reduce((a, b) => a + b, 0);
    const avgWakes = nightsWithData.length ? (totalWakes / nightsWithData.length).toFixed(1) : '—';
    const qualities = nights.map(n => n.night.quality).filter(Boolean);
    const avgQuality = qualities.length ? (qualities.reduce((a, b) => a + b, 0) / qualities.length).toFixed(1) : '—';
    const durations = nights.filter(n => n.night.bedtime && n.night.getup).map(n => n.night.getup - n.night.bedtime);
    const avgDuration = durations.length ? fmtDuration(durations.reduce((a,b) => a+b, 0) / durations.length) : '—';

    document.getElementById('week-summary').innerHTML = `
      <div class="week-stat"><div class="val">${totalWakes}</div><div class="lbl">Total wakes</div><div class="sub">Avg ${avgWakes} per night</div></div>
      <div class="week-stat"><div class="val">${avgQuality}</div><div class="lbl">Avg quality</div><div class="sub">${qualities.length} night${qualities.length !== 1 ? 's' : ''} rated</div></div>
      <div class="week-stat"><div class="val">${avgDuration}</div><div class="lbl">Avg in bed</div><div class="sub">${durations.length} night${durations.length !== 1 ? 's' : ''} tracked</div></div>
      <div class="week-stat"><div class="val">${nightsWithData.length}</div><div class="lbl">Nights logged</div><div class="sub">of 7 this week</div></div>`;
  }

  // ── Export CSV ──────────────────────────────────────────────────────────────
  function exportCSV() {
    const raw = getRawData();
    const keys = Object.keys(raw).sort();
    const qLabels = ['', 'Very tired', 'Tired', 'OK', 'Rested', 'Great'];
    const rows = [['Date', 'Bedtime', 'Get Up', 'Time in Bed', 'Wake Count', 'Wake Times', 'Notes', 'Quality']];
    keys.forEach(key => {
      const night = getNight(key);
      const wakes = night.wakes.slice().sort((a, b) => a.ts - b.ts);
      rows.push([
        key,
        night.bedtime ? fmtTime(night.bedtime) : '',
        night.getup ? fmtTime(night.getup) : '',
        night.bedtime && night.getup ? fmtDuration(night.getup - night.bedtime) : '',
        wakes.length,
        wakes.map(w => fmtTime(w.ts)).join(', '),
        wakes.filter(w => w.note).map(w => `${fmtTime(w.ts)}: ${w.note}`).join(' | '),
        night.quality ? `${night.quality} - ${qLabels[night.quality]}` : ''
      ]);
    });
    const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = 'wake-times.csv';
    a.click();
  }

  // ── Tabs ────────────────────────────────────────────────────────────────────
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.view).classList.add('active');
      if (btn.dataset.view === 'history-view') renderHistory();
      if (btn.dataset.view === 'week-view') renderWeek();
    });
  });

  // ── Clock ────────────────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('live-clock').textContent = new Date().toLocaleTimeString(undefined, {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }
  updateClock(); setInterval(updateClock, 1000);

  // ── Flash ─────────────────────────────────────────────────────────────────────
  let flashTimer;
  function showFlash(msg) {
    const el = document.getElementById('flash');
    el.textContent = msg; el.classList.remove('hidden');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => el.classList.add('hidden'), 2000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  renderTonight();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/wake-sw.js').catch(() => {});
  }
</script>
</body>
</html>
